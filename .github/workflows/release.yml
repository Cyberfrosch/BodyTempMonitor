name: Release

# Triggered by a push of any tag matching v* (e.g. v1.0.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release and upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: BodyTempMonitor-windows-x64
          - os: ubuntu-latest
            artifact_name: BodyTempMonitor-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Project is developed on Python 3.14 but is compatible with 3.10+.
      # Python 3.14 is pre-release and not yet available on GitHub-hosted runners;
      # 3.12 is used here as the latest stable version available on all runner images.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # PySide6 requires several shared libraries on headless Linux runners.
      # PyInstaller imports the package during analysis even without a display.
      - name: Install system libraries for PySide6 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libglib2.0-0 libxkbcommon0 libdbus-1-3

      # The build scripts create their own venv, install dependencies, run
      # PyInstaller for all three specs, and copy config.json to dist/.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          .\build.ps1

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: bash build.sh

      # Pack the entire dist/ directory (three binaries + config.json).
      # device_config.json and sensor_data.db are created at runtime and are NOT included.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* `
            -DestinationPath "${{ matrix.artifact_name }}-${{ github.ref_name }}.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.artifact_name }}-${{ github.ref_name }}.tar.gz" -C dist .

      # Both matrix jobs upload their archive to the same GitHub Release.
      # softprops/action-gh-release creates the release on first call and
      # appends assets on subsequent calls — safe for parallel matrix jobs.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: ${{ matrix.artifact_name }}-${{ github.ref_name }}.*
          body: |
            ## Contents

            Each archive contains three standalone binaries (no Python or PySide6 required on the target machine):

            | File | Description |
            |------|-------------|
            | `BodyTempMonitor-server(.exe)` | HTTP server · web dashboard · device config page (`/config`) |
            | `BodyTempMonitor-cli(.exe)`    | CLI: `config --show/set/upload/reset` · `log --monitor`      |
            | `BodyTempMonitor-gui(.exe)`    | Desktop GUI — server + config + logger in one window          |
            | `config.json`                  | Configuration template — **edit before first use**            |

            Place all files in the same directory. Files created automatically at first run:

            | File | Created by | Description |
            |------|-----------|-------------|
            | `sensor_data.db`     | server / gui | SQLite temperature database |
            | `device_config.json` | server / gui | Desired device config (web channel) |

            > **Note:** `BodyTempMonitor-gui` bundles the Qt runtime (~50–80 MB) and extracts it on each launch (onefile mode). See README for `--onedir` alternative if startup time is a concern.
